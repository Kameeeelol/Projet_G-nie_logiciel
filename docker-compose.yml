version: '3.8'

services:
  mongo:
    image: mongo:7
    restart: always
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    environment:
      - MONGO_URL=mongodb://mongo:27017
      - DB_NAME=stageconnect
      - JWT_SECRET=${JWT_SECRET:-stageconnect-secret-change-me}
      - CORS_ORIGINS=*
    depends_on:
      - mongo
    ports:
      - "8001:8001"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/build:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend

volumes:
  mongo_data:
